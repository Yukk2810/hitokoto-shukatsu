name: JPX開示情報収集

on:
  schedule:
    # 平日の9〜18時を1時間おきに収集（JST = UTC+9）
    # UTC 00:00〜09:00 = JST 09:00〜18:00
    - cron: '0 0-9 * * 1-5'
    # 開場直前・直後は追加実行
    - cron: '50 23 * * 0-4'   # JST 08:50（開場前）
    - cron: '30 6  * * 1-5'   # JST 15:30（引け直後）
  workflow_dispatch:           # 手動実行も可能
    inputs:
      force_full:
        description: '全件再取得（差分でなく全データ）'
        required: false
        default: 'false'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # JSON書き出しのためのcommit権限

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run collector
        working-directory: scripts
        env:
          FORCE_FULL: ${{ github.event.inputs.force_full }}
        run: node collect.js

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/disclosures/
          # 変更があればコミット
          if git diff --staged --quiet; then
            echo "変更なし — スキップ"
          else
            CHANGED=$(git diff --staged --name-only | wc -l)
            git commit -m "chore: 開示情報更新 [${CHANGED}ファイル] $(date +'%Y-%m-%d %H:%M JST')"
            git push
          fi
