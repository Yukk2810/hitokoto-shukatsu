<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ひとこと就活 — 企業のキャッチコピーから、直感で会社と出会う就職情報サービス">
<title>ひとこと就活</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ─── みてね風カラーパレット ─── */
    --bg:            #f7f4f0;          /* 暖かいオフホワイト */
    --bg-canvas:     #ece8e2;          /* 3Dキャンバス背景 */
    --bg-panel:      #ffffff;
    --bg-header:     rgba(247,244,240,0.92);
    --surface:       #ffffff;
    --surface-warm:  #fdf9f5;
    --border:        rgba(60,45,30,0.1);
    --border-soft:   rgba(60,45,30,0.06);
    --border-strong: rgba(60,45,30,0.18);

    /* ─── テキスト（黒より温かいブラウン系） ─── */
    --text-primary:   #2c2017;
    --text-secondary: rgba(44,32,23,0.55);
    --text-muted:     rgba(44,32,23,0.35);
    --text-on-accent: #ffffff;

    /* ─── 役割別カラー ─── */
    /* ブランド色: coral/warm orange — 選択・強調のみ */
    --accent:         #e8734a;
    --accent-light:   #fff0ea;
    --accent-mid:     rgba(232,115,74,0.15);

    /* 操作色: teal — ボタン・リンク・外部遷移 */
    --action:         #2a9d8f;
    --action-light:   #e8f7f5;
    --action-mid:     rgba(42,157,143,0.12);

    /* 新着・重要度 — 役割固定 */
    --tag-high:       #e84040;         /* 高重要度のみ */
    --tag-high-bg:    #fef0f0;
    --tag-med:        #e8a020;         /* 中重要度のみ */
    --tag-med-bg:     #fef8ec;
    --tag-low:        #60a060;         /* 低重要度のみ */
    --tag-low-bg:     #f0f8f0;

    /* 業種タグ — 操作色と混同しない青紫系 */
    --tag-industry:   #6655cc;
    --tag-industry-bg:#f0eeff;

    /* ─── タイポグラフィ ─── */
    --font-ja: "ヒラギノ角ゴ ProN", "Hiragino Kaku Gothic ProN",
               "ヒラギノ角ゴ Pro", "Hiragino Kaku Gothic Pro",
               "游ゴシック Medium", "Yu Gothic Medium", YuGothic,
               "Noto Sans JP", sans-serif;
    --font-mono: "SF Mono", ui-monospace, "Cascadia Code", monospace;

    /* ─── シェイプ ─── */
    --radius-sm:  8px;
    --radius-md:  12px;
    --radius-lg:  18px;
    --radius-xl:  24px;
    --panel-w:    400px;
    --shadow-sm:  0 1px 4px rgba(44,32,23,0.08), 0 0 0 0.5px rgba(44,32,23,0.06);
    --shadow-md:  0 4px 16px rgba(44,32,23,0.1), 0 0 0 0.5px rgba(44,32,23,0.06);
    --shadow-panel: -4px 0 32px rgba(44,32,23,0.12);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-canvas);
    color: var(--text-primary);
    font-family: var(--font-ja);
    cursor: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ══════════ カーソル（みてね風: コーラル色・やわらか） ══════════ */
  #cursor {
    position: fixed; z-index: 9999;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%,-50%);
    transition: width .18s ease, height .18s ease, opacity .18s ease;
    opacity: 0.85;
  }
  #cursor.hover {
    width: 28px; height: 28px;
    background: var(--accent-light);
    border: 2px solid var(--accent);
    opacity: 1;
  }
  #cursor-ring {
    position: fixed; z-index: 9998;
    width: 28px; height: 28px;
    border: 1.5px solid rgba(232,115,74,0.3);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%,-50%);
  }

  canvas {
    display: block; position: fixed; inset: 0;
  }

  /* ══════════ ヘッダー（みてね風: 白背景・ソフトな区切り） ══════════ */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-header);
    backdrop-filter: blur(16px) saturate(1.4);
    border-bottom: 1px solid var(--border-soft);
    pointer-events: none;
  }
  #logo-area {
    display: flex; align-items: center; gap: 10px;
    pointer-events: auto;
  }
  #logo-img {
    height: 32px; width: auto; display: block;
    filter: drop-shadow(0 1px 3px rgba(232,115,74,0.2));
  }
  #logo-sub {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  #hint {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ══════════ 検索バー ══════════ */
  #search-wrap {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 101;
    display: flex; align-items: center;
  }
  #search-input {
    font-family: var(--font-ja);
    font-size: 12px;
    color: var(--text-primary);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-right: none;
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    padding: 7px 14px;
    width: 200px;
    outline: none;
    cursor: none;
    transition: border-color .2s ease, width .28s ease, box-shadow .2s ease;
    box-shadow: var(--shadow-sm);
  }
  #search-input::placeholder { color: var(--text-muted); }
  #search-input:focus {
    border-color: var(--accent);
    width: 240px;
    box-shadow: 0 0 0 3px var(--accent-mid);
  }
  #search-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 7px 12px; color: var(--text-muted);
    font-size: 13px; cursor: none;
    box-shadow: var(--shadow-sm);
    transition: color .18s ease;
  }
  #search-btn:hover { color: var(--accent); }

  /* ══════════ 件数バッジ ══════════ */
  #count-badge {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: var(--text-muted);
    background: rgba(247,244,240,0.9);
    border: 1px solid var(--border-soft);
    border-radius: 100px; padding: 2px 12px;
    pointer-events: none; z-index: 100; white-space: nowrap;
    backdrop-filter: blur(8px);
  }

  /* ══════════ フィルターバー（みてね風: 丸いピル・暖色） ══════════ */
  #filters {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    display: flex; gap: 4px; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 8px;
    box-shadow: var(--shadow-md);
    max-width: calc(100vw - 20px);
    overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap;
  }
  #filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    font-family: var(--font-ja);
    font-size: 11px; font-weight: 500;
    color: var(--text-secondary);
    background: none; border: none;
    border-radius: 100px; padding: 4px 13px;
    cursor: none; white-space: nowrap; flex-shrink: 0;
    transition: all .15s ease;
  }
  .filter-btn:hover {
    background: var(--surface-warm);
    color: var(--text-primary);
  }
  .filter-btn.active {
    background: var(--accent);
    color: white;
    font-weight: 600;
  }
  .filter-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }

  /* ══════════ ツールチップ ══════════ */
  #tooltip {
    position: fixed; z-index: 99; pointer-events: none;
    font-family: var(--font-ja);
    font-size: 11px; font-weight: 500;
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 5px 12px;
    white-space: nowrap; opacity: 0;
    box-shadow: var(--shadow-sm);
    transition: opacity .1s ease;
  }
  #tooltip.show { opacity: 1; }

  /* ══════════ オーバーレイ ══════════ */
  #overlay {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(44,32,23,0.28);
    opacity: 0; pointer-events: none;
    transition: opacity .35s ease;
    backdrop-filter: blur(2px);
  }
  #overlay.show { opacity: 1; pointer-events: auto; }

  /* ══════════ 詳細パネル（みてね風: 白・丸・温かい） ══════════ */
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--panel-w); z-index: 200;
    background: var(--bg-panel);
    border-left: 1px solid var(--border-soft);
    box-shadow: var(--shadow-panel);
    transform: translateX(100%);
    transition: transform .46s cubic-bezier(.16,1,.3,1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #panel.open { transform: translateX(0); }

  /* 層1: ファーストビュー */
  #panel-header {
    padding: 56px 24px 20px;
    border-bottom: 1px solid var(--border-soft);
    flex-shrink: 0; position: relative;
    background: var(--surface-warm);
  }
  #panel-logo-row {
    display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px;
  }
  #panel-logo-wrap {
    width: 48px; height: 48px; border-radius: var(--radius-md);
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  #panel-logo-img { width: 34px; height: 34px; object-fit: contain; display: none; }
  #panel-logo-emoji { font-size: 22px; line-height: 1; }
  #panel-meta { flex: 1; min-width: 0; }

  #panel-industry-tag {
    font-size: 9.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--tag-industry);
    background: var(--tag-industry-bg);
    border-radius: 100px; padding: 2px 9px;
    display: inline-block; margin-bottom: 4px;
  }
  #panel-company-name {
    font-size: 19px; font-weight: 700; line-height: 1.25;
    color: var(--text-primary); letter-spacing: -0.02em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #panel-ticker {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
  }

  /* キャッチコピー — みてね風: 大きめフォント・温かい強調 */
  #panel-tagline {
    font-size: 14px; font-weight: 500; line-height: 1.8;
    color: var(--accent);
    background: var(--accent-light);
    border-radius: var(--radius-md); padding: 10px 14px;
    word-break: break-all;
    display: -webkit-box; -webkit-line-clamp: 4;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  /* 層2: スペック */
  #panel-body {
    flex: 1; overflow-y: auto;
    padding: 20px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #panel-body::-webkit-scrollbar { width: 3px; }
  #panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .info-section { margin-bottom: 20px; }
  .info-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 8px;
  }
  .info-value {
    font-size: 12.5px; line-height: 1.85; color: var(--text-secondary);
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card {
    background: var(--surface-warm);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md); padding: 12px;
  }
  .stat-lbl {
    font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px;
  }
  .stat-val {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    word-break: break-all;
  }

  .bar { margin-bottom: 9px; }
  .bar-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-secondary); margin-bottom: 5px;
  }
  .bar-head .bval {
    font-family: var(--font-mono); color: var(--accent); font-size: 10px; font-weight: 600;
  }
  .bar-track {
    height: 4px; background: var(--border-soft);
    border-radius: 100px; overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #f0a060 100%);
    border-radius: 100px;
    transition: width .8s cubic-bezier(.16,1,.3,1);
  }

  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 10.5px; font-weight: 500;
    color: var(--text-secondary);
    background: var(--surface-warm);
    border: 1px solid var(--border);
    border-radius: 100px; padding: 3px 11px;
    cursor: none;
    transition: background .15s ease, color .15s ease;
  }
  .tag:hover { background: var(--accent-light); color: var(--accent); border-color: rgba(232,115,74,0.3); }

  /* ─── 開示情報セクション ─── */
  .disclosure-list { display: flex; flex-direction: column; gap: 8px; }
  .disclosure-item {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md); padding: 11px 13px;
    text-decoration: none; display: block;
    transition: box-shadow .15s ease, border-color .15s ease;
  }
  .disclosure-item:hover {
    box-shadow: var(--shadow-sm);
    border-color: var(--border);
  }
  .disc-meta {
    display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap;
  }
  .disc-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
    border-radius: 100px; padding: 2px 8px; flex-shrink: 0;
  }
  .disc-badge.high { background: var(--tag-high-bg); color: var(--tag-high); }
  .disc-badge.medium { background: var(--tag-med-bg); color: var(--tag-med); }
  .disc-badge.low { background: var(--tag-low-bg); color: var(--tag-low); }
  .disc-cat {
    font-size: 9.5px; color: var(--text-muted); font-weight: 500;
  }
  .disc-date {
    font-family: var(--font-mono); font-size: 9px; color: var(--text-muted);
    margin-left: auto;
  }
  .disc-title {
    font-size: 11.5px; font-weight: 500; color: var(--text-primary);
    line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .disc-empty {
    font-size: 12px; color: var(--text-muted);
    text-align: center; padding: 16px 0;
  }
  .disc-loading {
    font-size: 12px; color: var(--text-muted);
    text-align: center; padding: 16px 0;
    animation: pulse-text 1.4s ease-in-out infinite;
  }
  @keyframes pulse-text {
    0%,100% { opacity:0.4; } 50% { opacity:1; }
  }

  /* 層3: アクション */
  #panel-footer {
    padding: 12px 24px 20px;
    border-top: 1px solid var(--border-soft);
    flex-shrink: 0; display: flex; gap: 8px;
  }
  .btn-primary {
    flex: 1; padding: 11px;
    background: var(--action); color: white;
    border: none; border-radius: var(--radius-md);
    font-family: var(--font-ja); font-size: 12px; font-weight: 600;
    cursor: none; text-decoration: none;
    text-align: center; display: flex; align-items: center; justify-content: center;
    transition: opacity .18s ease, transform .12s ease;
  }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
  .btn-icon {
    width: 42px; height: 42px;
    background: var(--surface-warm); border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-muted); font-size: 18px; cursor: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s ease;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-icon.active { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

  #close-btn {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 50%; color: var(--text-muted);
    font-size: 12px; cursor: none;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm);
    transition: all .15s ease;
  }
  #close-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }

  /* ══════════ ブックマークボタン ══════════ */
  #bookmark-toggle {
    position: fixed; top: 10px; right: 16px; z-index: 101;
    font-family: var(--font-ja); font-size: 11px; font-weight: 500;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 100px; padding: 5px 14px;
    cursor: none;
    display: flex; align-items: center; gap: 6px;
    box-shadow: var(--shadow-sm);
    transition: all .15s ease;
  }
  #bookmark-toggle:hover { border-color: var(--accent); color: var(--accent); }
  #bookmark-count {
    background: var(--accent); color: white;
    font-size: 9px; font-weight: 700;
    border-radius: 100px; padding: 1px 6px; display: none;
  }
  #bookmark-count.show { display: inline; }

  /* ══════════ ローディング（みてね風: 暖かく・優しく） ══════════ */
  #loading {
    position: fixed; inset: 0; z-index: 9000;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    transition: opacity .8s ease;
  }
  #loading.fade { opacity: 0; pointer-events: none; }
  #loading-logo {
    height: 56px; width: auto;
    animation: breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1); opacity:0.9; }
    50%      { transform: scale(1.04); opacity:1; }
  }
  #loading-sub {
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--accent); margin-bottom: 20px;
  }
  #loading-track {
    width: 80px; height: 3px;
    background: var(--border-soft); border-radius: 100px;
    overflow: hidden;
  }
  #loading-fill {
    height: 100%; background: var(--accent);
    width: 0%; border-radius: 100px;
    transition: width 1.5s cubic-bezier(.16,1,.3,1);
  }

  /* ══════════ トースト ══════════ */
  #toast {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    z-index: 300; font-family: var(--font-ja); font-size: 11px; font-weight: 500;
    color: white; background: var(--tag-high);
    border-radius: var(--radius-md); padding: 8px 18px;
    opacity: 0; pointer-events: none;
    box-shadow: var(--shadow-md);
    transition: opacity .25s ease; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ══════════ レスポンシブ ══════════ */
  @media (max-width: 640px) {
    :root { --panel-w: 100vw; }
    #hint { display: none; }
    #bookmark-toggle { top: 10px; right: 14px; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="tooltip"></div>

const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:8888/.netlify/functions'
  : '/.netlify/functions';

let ALL_COMPANIES = [];

async function fetchCompanies() {
  // まずAPIを試みる（Netlify Functions が有効な場合）
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 3000);
    const res = await fetch(`${API_BASE}/companies`, { signal: controller.signal });
    clearTimeout(timeout);
    if (res.ok) {
      const json = await res.json();
      if (json.data && json.data.length > 0) return json.data;
    }
  } catch (err) {
    // タイムアウト or ネットワークエラー → 埋め込みデータで続行
  }
  // フォールバック: 埋め込みデータを使用
  console.info('Using embedded company data');
  return EMBEDDED_COMPANIES;
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function makeTaglineTexture(text, color = '#f0ede8') {
  const off = document.createElement('canvas');
  const ctx = off.getContext('2d');
  const fs = 25;
  ctx.font = `${fs}px serif`;
  const w = Math.min(Math.ceil(ctx.measureText(text).width) + 52, 960);
  const h = fs + 30;
  off.width = w; off.height = h;
  ctx.clearRect(0, 0, w, h);
  ctx.font = `${fs}px serif`;
  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.fillText(text, 26, h / 2);
  return { texture: new THREE.CanvasTexture(off), w, h };
}

function fibonacciSphere(n, r) {
  const pts = [], ga = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / (n - 1)) * 2;
    const rad = Math.sqrt(1 - y * y);
    const t = ga * i;
    pts.push(new THREE.Vector3(Math.cos(t) * rad * r, y * r, Math.sin(t) * rad * r));
  }
  return pts;
}

const RADIUS = 92;
const sprites = [];
const group = new THREE.Group();
scene.add(group);

function buildSprites(companies) {
  // 既存スプライトを削除
  sprites.forEach(m => group.remove(m));
  sprites.length = 0;

  const positions = fibonacciSphere(companies.length, RADIUS);
  companies.forEach((c, i) => {
    const { texture, w, h } = makeTaglineTexture(c.tagline, c.color);
    const asp = w / h;
    const ph = 4.4, pw = ph * asp;
    const geo = new THREE.PlaneGeometry(pw, ph);
    const mat = new THREE.MeshBasicMaterial({
      map: texture, transparent: true, depthWrite: false, side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(positions[i]);
    mesh.userData = { company: c, index: i, hovered: false, originalPos: positions[i].clone(), visible: true };
    group.add(mesh);
    sprites.push(mesh);
  });
}

// =============================================
// INTERACTION
// =============================================
const mouse = new THREE.Vector2(-9, -9);
const raycaster = new THREE.Raycaster();
let isDragging = false, hasDragged = false;
let prevMouseXY = { x: 0, y: 0 };
let rotX = 0, rotY = 0, targetRotX = 0, targetRotY = 0;
let zoom = 1, targetZoom = 1;
let autoRotate = true;
let hoveredMesh = null;
let curFilterIndustry = 'all';
let curSearchQuery = '';

const cursorEl = document.getElementById('cursor');
const ringEl = document.getElementById('cursor-ring');
const tooltipEl = document.getElementById('tooltip');
let cx = 0, cy = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  cx = e.clientX; cy = e.clientY;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  if (isDragging) {
    const dx = e.clientX - prevMouseXY.x, dy = e.clientY - prevMouseXY.y;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) hasDragged = true;
    targetRotY += dx * .005;
    targetRotX += dy * .005;
    targetRotX = Math.max(-1.35, Math.min(1.35, targetRotX));
    prevMouseXY = { x: e.clientX, y: e.clientY };
    autoRotate = false;
  }
  tooltipEl.style.left = (e.clientX + 16) + 'px';
  tooltipEl.style.top  = (e.clientY - 8) + 'px';
});

canvas.addEventListener('mousedown', e => {
  isDragging = true; hasDragged = false;
  prevMouseXY = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => { isDragging = false; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetZoom *= 1 - e.deltaY * .001;
  targetZoom = Math.max(.3, Math.min(3.2, targetZoom));
}, { passive: false });

canvas.addEventListener('click', () => {
  if (hasDragged) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(sprites.filter(s => s.userData.visible));
  if (hits.length) openPanel(hits[0].object.userData.company);
});

// タッチ対応
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && touchStart) {
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    targetRotY += dx * .005;
    targetRotX += dy * .005;
    targetRotX = Math.max(-1.35, Math.min(1.35, targetRotX));
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    autoRotate = false;
  }
}, { passive: true });

// =============================================
// PANEL
// =============================================
const panel = document.getElementById('panel');
const overlay = document.getElementById('overlay');
let selectedCompany = null;
const bookmarks = new Set();

function openPanel(c) {
  selectedCompany = c;
  document.getElementById('panel-industry-tag').textContent = c.industry;
  document.getElementById('panel-company-name').textContent = c.name;
  document.getElementById('panel-ticker').textContent = `${c.ticker} · ${c.market || ''}`;
  document.getElementById('panel-tagline').textContent = `"${c.tagline}"`;
  document.getElementById('panel-mission').textContent = c.mission;
  document.getElementById('panel-about').textContent = c.about;
  loadLogo(c);

  document.getElementById('panel-stats').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">設立</div><div class="stat-val">${c.founded}年</div></div>
    <div class="stat-card"><div class="stat-lbl">従業員</div><div class="stat-val">${c.employees}</div></div>
    <div class="stat-card"><div class="stat-lbl">売上高</div><div class="stat-val">${c.revenue}</div></div>
    <div class="stat-card"><div class="stat-lbl">上場</div><div class="stat-val" style="font-size:10px">${c.market || 'TSE'}</div></div>
  `;

  document.getElementById('panel-bars').innerHTML = (c.bars || []).map(b => `
    <div class="bar">
      <div class="bar-head"><span>${b.label}</span><span>${b.val}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:0%" data-t="${b.val}%"></div></div>
    </div>
  `).join('');

  document.getElementById('panel-tags').innerHTML = (c.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('panel-link').href = c.url;

  // 適時開示情報をロード
  loadDisclosures(c);

  const bkBtn = document.getElementById('bookmark-btn');
  const isBookmarked = bookmarks.has(c.id);
  bkBtn.textContent = isBookmarked ? '★' : '☆';
  bkBtn.className = 'btn-icon' + (isBookmarked ? ' active' : '');

  panel.classList.add('open');
  overlay.classList.add('show');

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(el => { el.style.width = el.dataset.t; });
    }, 60);
  });
}

function closePanel() {
  panel.classList.remove('open');
  overlay.classList.remove('show');
  selectedCompany = null;
}

document.getElementById('close-btn').addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);

function loadLogo(c) {
  const img = document.getElementById('panel-logo-img');
  const emo = document.getElementById('panel-logo-emoji');
  img.style.display = 'none';
  emo.style.display = 'block';
  emo.textContent = c.emoji;
  if (!c.domain) return;
  const src = `https://www.google.com/s2/favicons?domain=${c.domain}&sz=64`;
  const test = new Image();
  test.onload = () => {
    if (test.naturalWidth >= 32) {
      img.src = src; img.style.display = 'block'; emo.style.display = 'none';
    }
  };
  test.src = src;
}

document.getElementById('bookmark-btn').addEventListener('click', function() {
  if (!selectedCompany) return;
  const id = selectedCompany.id;
  if (bookmarks.has(id)) { bookmarks.delete(id); this.textContent = '☆'; this.className = 'btn-icon'; }
  else                   { bookmarks.add(id);    this.textContent = '★'; this.className = 'btn-icon active'; }
  updateBookmarkBadge();
});

function updateBookmarkBadge() {
  const cnt = document.getElementById('bookmark-count');
  cnt.textContent = bookmarks.size;
  cnt.classList.toggle('show', bookmarks.size > 0);
}

document.getElementById('bookmark-toggle').addEventListener('click', () => {
  if (bookmarks.size === 0) { showToast('ブックマークはまだありません'); return; }
  // ブックマーク企業のみ表示
  const bookmarkedIds = new Set(bookmarks);
  sprites.forEach(m => {
    m.userData.visible = bookmarkedIds.has(m.userData.company.id);
  });
  document.getElementById('count-badge').textContent = `${bookmarks.size} 社（ブックマーク）`;
});

// =============================================
// FILTER & SEARCH
// =============================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    curFilterIndustry = btn.dataset.filter;
    applyFilter();
  });
});

const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', () => {
  curSearchQuery = searchInput.value.trim().toLowerCase();
  applyFilter();
});
searchInput.addEventListener('focus', () => { cursorEl.style.display = 'none'; });
searchInput.addEventListener('blur',  () => { cursorEl.style.display = 'block'; });

function applyFilter() {
  let count = 0;
  sprites.forEach(mesh => {
    const c = mesh.userData.company;
    const industryOk = curFilterIndustry === 'all' || c.industry === curFilterIndustry;
    const searchOk = curSearchQuery === '' ||
      c.name.toLowerCase().includes(curSearchQuery) ||
      c.tagline.toLowerCase().includes(curSearchQuery) ||
      (c.tags || []).some(t => t.toLowerCase().includes(curSearchQuery)) ||
      c.ticker.includes(curSearchQuery);
    const visible = industryOk && searchOk;
    mesh.userData.visible = visible;
    if (visible) count++;
  });
  document.getElementById('count-badge').textContent = `${count} 社表示中`;
}

// =============================================
// ANIMATION LOOP
// =============================================
const clock = new THREE.Clock();
let time = 0;

function resize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
window.addEventListener('resize', resize);
resize();

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), .05);
  time += delta;

  if (autoRotate && !isDragging) targetRotY += delta * .032;
  rotX += (targetRotX - rotX) * .065;
  rotY += (targetRotY - rotY) * .065;
  group.rotation.x = rotX;
  group.rotation.y = rotY;

  zoom += (targetZoom - zoom) * .08;
  camera.position.z = 155 / zoom;

  // Hover
  raycaster.setFromCamera(mouse, camera);
  const visibles = sprites.filter(s => s.userData.visible);
  const hits = raycaster.intersectObjects(visibles);
  const newHov = hits.length ? hits[0].object : null;
  if (hoveredMesh !== newHov) {
    hoveredMesh = newHov;
    if (hoveredMesh) {
      cursorEl.classList.add('hover');
      tooltipEl.textContent = hoveredMesh.userData.company.name;
      tooltipEl.classList.add('show');
    } else {
      cursorEl.classList.remove('hover');
      tooltipEl.classList.remove('show');
    }
  }

  sprites.forEach((mesh, i) => {
    const vis = mesh.userData.visible;
    const hov = mesh === hoveredMesh;
    mesh.material.opacity += ((vis ? (hov ? 1 : .78) : 0) - mesh.material.opacity) * .09;

    if (vis) {
      const orig = mesh.userData.originalPos;
      const fl = Math.sin(time * .24 + i * .63) * 1.3;
      const tgt = orig.clone().normalize().multiplyScalar(RADIUS + fl);
      mesh.position.lerp(tgt, .022);
    }

    // Billboard
    const inv = group.quaternion.clone().invert();
    mesh.quaternion.copy(camera.quaternion).premultiply(inv);

    // Scale
    const ts = hov ? 1.11 : 1;
    mesh.scale.x += (ts - mesh.scale.x) * .12;
    mesh.scale.y = mesh.scale.x;
  });

  // Cursor
  rx += (cx - rx) * .13; ry += (cy - ry) * .13;
  cursorEl.style.left = cx + 'px'; cursorEl.style.top = cy + 'px';
  ringEl.style.left   = rx + 'px'; ringEl.style.top  = ry + 'px';

  renderer.render(scene, camera);
}

// =============================================
// 適時開示情報ローダー（JPX公開データ）
// =============================================
const DISCLOSURE_BASE = '/data/disclosures';
const IMPORTANCE_LABEL = { high: '重要', medium: '注目', low: '参考' };

async function loadDisclosures(company) {
  const listEl = document.getElementById('disclosure-list');
  listEl.innerHTML = '<div class="disc-loading">取得中...</div>';

  const code = company.ticker ? company.ticker.split(' ')[0].split('·')[0].trim() : null;
  if (!code) { listEl.innerHTML = '<div class="disc-empty">証券コードなし</div>'; return; }

  try {
    // 企業別JSON → なければ最新一覧から検索
    let items = [];
    try {
      const res = await fetch(`${DISCLOSURE_BASE}/by-code/${code}.json`);
      if (res.ok) { const j = await res.json(); items = j.disclosures || []; }
    } catch(_) {}

    if (items.length === 0) {
      // latest.jsonから当該銘柄を探す
      try {
        const res2 = await fetch(`${DISCLOSURE_BASE}/latest.json`);
        if (res2.ok) {
          const j2 = await res2.json();
          items = (j2.disclosures || []).filter(d => d.code === code).slice(0, 5);
        }
      } catch(_) {}
    }

    if (items.length === 0) {
      listEl.innerHTML = '<div class="disc-empty">開示情報なし（データ収集前）</div>';
      return;
    }

    listEl.innerHTML = items.slice(0, 5).map(d => {
      const dt = d.publishedAt ? new Date(d.publishedAt).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
      const imp = d.importance || 'low';
      const impLabel = IMPORTANCE_LABEL[imp] || imp;
      const url = d.pdfUrl || '#';
      return `<a class="disclosure-item" href="${url}" target="_blank" rel="noopener noreferrer" style="cursor:pointer">
        <div class="disc-meta">
          <span class="disc-badge ${imp}">${impLabel}</span>
          <span class="disc-cat">${d.category || 'その他'}</span>
          <span class="disc-date">${dt}</span>
        </div>
        <div class="disc-title">${d.title || '（タイトルなし）'}</div>
      </a>`;
    }).join('');
  } catch(err) {
    listEl.innerHTML = '<div class="disc-empty">取得できませんでした</div>';
  }
}

// =============================================
// BOOT — APIからデータ取得してスプライト構築
// =============================================
async function boot() {
  document.getElementById('loading-fill').style.width = '60%';

  let companies = await fetchCompanies();

  if (!companies || companies.length === 0) {
    companies = EMBEDDED_COMPANIES; // 最終フォールバック
  }

  ALL_COMPANIES = companies;
  document.getElementById('loading-fill').style.width = '100%';

  buildSprites(ALL_COMPANIES);
  applyFilter();
  animate();

  setTimeout(() => {
    document.getElementById('loading').classList.add('fade');
    autoRotate = true;
  }, 500);
}

boot();
</script>
